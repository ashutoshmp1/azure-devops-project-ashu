name: Deploy with Health Check & Rollback

on:
  push:
    branches:
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Zip application
        run: |
          cd app
          zip -r ../app.zip .

      - name: Deploy to Azure Web App (Staging)
        run: |
          az webapp deployment source config-zip \
            --resource-group devops-rg \
            --name azure-devops-project-ashu \
            --slot staging \
            --src app.zip

      - name: Wait for app to start
        run: sleep 30

      - name: Health Check
        id: healthcheck
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://azure-devops-project-ashu-staging.azurewebsites.net/health)
          echo "Health status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check failed"
            exit 1
          fi

      - name: Swap Staging to Production
        if: success()
        run: |
          az webapp deployment slot swap \
            --name azure-devops-project-ashu \
            --resource-group devops-rg \
            --slot staging \
            --target-slot production

      - name: Rollback if Health Check Fails
        if: failure()
        run: |
          az webapp deployment slot swap \
            --name azure-devops-project-ashu \
            --resource-group devops-rg \
            --slot staging \
            --target-slot production